services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vitalfy_app
    restart: always
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: vitalfy_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: postgres:16-alpine
    container_name: vitalfy_postgres
    restart: always
    environment:
      POSTGRES_DB: vitalfy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: vitalfy_redis
    restart: always
    command: redis-server --appendonly yes
    # ports:
    #   - "6379:6379"
    volumes:
      - redis:/data
    networks:
      - laravel

networks:
  laravel:

volumes:
  dbdata:
  redis:
